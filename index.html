<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Account Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF6B00;
    --orange-dim: #cc5500;
    --orange-glow: rgba(255,107,0,0.18);
    --yellow: #FFD600;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --bg4: #222222;
    --border: rgba(255,255,255,0.08);
    --border-accent: rgba(255,107,0,0.35);
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --red: #FF3B3B;
    --green: #00D26A;
    --radius: 12px;
    --radius-sm: 8px;
  }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
  }
  body {
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,107,0,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
    padding: 0 16px 60px;
  }

  .header {
    max-width: 560px;
    margin: 0 auto;
    padding: 48px 0 32px;
    text-align: center;
  }
  .header-badge {
    display: inline-block;
    background: var(--orange-glow);
    border: 1px solid var(--border-accent);
    color: var(--orange);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    color: #fff;
  }
  .header h1 span { color: var(--orange); }
  .header p {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  .card {
    max-width: 560px;
    margin: 0 auto 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .input-wrap label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
  }
  input[type="text"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  input[type="text"]:focus { border-color: var(--orange); }

  .btn-check {
    width: 100%;
    padding: 13px;
    background: var(--orange);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-check:hover { background: #ff8533; }
  .btn-check:active { transform: scale(0.98); }
  .btn-check:disabled { background: var(--bg4); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #result-section { max-width: 560px; margin: 0 auto; }

  .alert {
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    border: 1px solid;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
    margin-bottom: 16px;
  }
  .alert-error { background: rgba(255,59,59,0.08); border-color: rgba(255,59,59,0.25); color: #ff7070; }
  .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert-title { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
  .alert-body { opacity: 0.85; line-height: 1.5; }

  /* Result card */
  .result-card {
    background: var(--bg2);
    border: 1px solid var(--border-accent);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn 0.4s ease;
    margin-bottom: 16px;
  }
  .result-header {
    background: linear-gradient(135deg, rgba(255,107,0,0.15) 0%, rgba(255,107,0,0.03) 100%);
    border-bottom: 1px solid var(--border-accent);
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .avatar {
    width: 60px; height: 60px;
    background: var(--orange-glow);
    border: 2px solid var(--border-accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--orange);
    flex-shrink: 0;
  }
  .result-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    word-break: break-all;
  }
  .result-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
  }
  .badge-valid { background: rgba(0,210,106,0.12); color: var(--green); border: 1px solid rgba(0,210,106,0.25); }
  .badge-uid { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-game { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--border-accent); }

  .result-body {
    padding: 20px 24px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .info-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    text-align: right;
    word-break: break-all;
    max-width: 60%;
  }
  .info-value.orange { color: var(--orange); }
  .info-value.green { color: var(--green); }

  .powered {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg3);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }
  .powered a { color: var(--text-dim); text-decoration: none; }

  .footer {
    max-width: 560px;
    margin: 24px auto 0;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Free Fire</div>
  <h1>UID <span>Checker</span></h1>
  <p>Validasi & cek nickname akun Free Fire by UID.</p>
</div>

<div class="card">
  <div class="card-title">Masukkan Player UID</div>
  <div class="input-wrap">
    <label for="uid-input">Player UID</label>
    <input type="text" id="uid-input" placeholder="Contoh: 225009777" maxlength="20" inputmode="numeric" />
  </div>
  <button class="btn-check" id="btn-check" onclick="checkAccount()">
    <span id="btn-text">CEK AKUN</span>
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<div id="result-section"></div>

<div class="footer">Powered by <a href="https://github.com/ihsangan/valid" target="_blank" style="color:var(--text-dim)">ihsangan/valid</a> · Data dari Codashop</div>

<script>
function setLoading(on) {
  const btn = document.getElementById('btn-check');
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent = on ? 'MENGECEK...' : 'CEK AKUN';
  btn.disabled = on;
}

function renderError(msg) {
  document.getElementById('result-section').innerHTML = `
    <div class="alert alert-error">
      <div class="alert-icon">⚠</div>
      <div>
        <div class="alert-title">Gagal</div>
        <div class="alert-body">${msg}</div>
      </div>
    </div>`;
}

function renderResult(uid, data) {
  const name = data.name || 'Unknown';
  const initials = name.replace(/[^\w]/g, '').slice(0, 2).toUpperCase() || 'FF';
  const game = data.game || 'Free Fire';

  document.getElementById('result-section').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="avatar">${initials}</div>
        <div>
          <div class="result-name">${name}</div>
          <div class="result-meta">
            <span class="badge badge-valid">✓ Valid</span>
            <span class="badge badge-uid">UID: ${uid}</span>
            <span class="badge badge-game">${game}</span>
          </div>
        </div>
      </div>
      <div class="result-body">
        <div class="info-row">
          <span class="info-label">Nickname</span>
          <span class="info-value orange">${name}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Player UID</span>
          <span class="info-value">${uid}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Status Akun</span>
          <span class="info-value green">Aktif ✓</span>
        </div>
        <div class="info-row">
          <span class="info-label">Game</span>
          <span class="info-value">${game}</span>
        </div>
      </div>
      <div class="powered">Data via <a href="https://codashop.com" target="_blank">Codashop</a></div>
    </div>`;
}

async function checkAccount() {
  const uid = document.getElementById('uid-input').value.trim();

  if (!uid) { renderError('Masukkan UID player terlebih dahulu.'); return; }
  if (!/^\d{6,20}$/.test(uid)) { renderError('UID harus berupa angka (6–20 digit).'); return; }

  setLoading(true);
  document.getElementById('result-section').innerHTML = '';

  try {
    const res = await fetch(`/api/check?uid=${encodeURIComponent(uid)}`);
    const data = await res.json();

    if (!res.ok || !data.success) {
      renderError(data.message || data.error || 'UID tidak ditemukan. Pastikan UID sudah benar.');
      return;
    }

    renderResult(uid, data);
  } catch (err) {
    renderError('Tidak dapat terhubung ke server. Periksa koneksi internet Anda.');
  } finally {
    setLoading(false);
  }
}

document.getElementById('uid-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAccount();
});
</script>
</body>
</html>
